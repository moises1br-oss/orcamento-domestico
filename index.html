
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Orçamento da Família</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12302B;
  --ink-soft:#4C6B63;
  --bg:#F2F9F6;
  --surface:#FFFFFF;
  --surface-soft:#EAF6F1;
  --primary:#0E9170;
  --primary-deep:#0A6E55;
  --primary-soft:#DDF1E7;
  --blue:#2F6FE4;
  --blue-soft:#E3ECFC;
  --negative:#DD5C49;
  --negative-soft:#FBE4DE;
  --warning:#E3A93D;
  --toast-bg:#12302B;
  --line:#D8E8E1;
  --line-strong:#B7D2C8;
  --shadow:0 1px 2px rgba(14,60,50,.06), 0 8px 22px rgba(14,80,65,.08);
  --radius-s:10px;
  --radius-m:16px;
  --radius-l:24px;
  --font-display:'Sora', 'Inter', system-ui, sans-serif;
  --font-body:'Inter', system-ui, sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

[data-theme="dark"]{
  --ink:#E7F3EE;
  --ink-soft:#9DBBAF;
  --bg:#101D19;
  --surface:#16261F;
  --surface-soft:#1D3128;
  --primary:#1FB683;
  --primary-deep:#3FE0A8;
  --primary-soft:#1E3A2D;
  --blue:#5C90F0;
  --blue-soft:#1E2C44;
  --negative:#FF7A66;
  --negative-soft:#3A2420;
  --warning:#F0C257;
  --line:#27392F;
  --line-strong:#3B5246;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 22px rgba(0,0,0,.35);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,.num-display{font-family:var(--font-display);}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}

a{color:var(--primary);}

.mono{font-family:var(--font-mono);}

::selection{background:var(--primary-soft);}

:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px;}

/* ---------- App shell ---------- */
#app{
  max-width:760px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:84px;
}

.app-header{
  padding:22px 18px 10px;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:10px;
}
.app-header .eyebrow{
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--primary-deep);
  font-weight:700;
  margin:0 0 2px;
}
.app-header h1{
  font-size:22px;
  font-weight:650;
  margin:0;
  letter-spacing:-.01em;
}
.app-header .today{
  font-size:12px;
  color:var(--ink-soft);
  font-family:var(--font-mono);
  white-space:nowrap;
}
#saveStatus{
  height:14px;
  opacity:0;
  transition:opacity .3s ease;
  font-size:10.5px;
  color:var(--primary-deep);
  font-weight:600;
}
#saveStatus.show-status{opacity:1;}

main#views{
  flex:1;
  padding:4px 18px 28px;
}

.view{display:none;}
.view.active{display:block;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){
  .view.active{animation:none;}
}

/* ---------- Nav (bottom bar mobile / sidebar desktop) ---------- */
nav#tabbar{
  position:fixed;
  left:0;right:0;bottom:0;
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--line);
  box-shadow:0 -2px 16px rgba(14,80,65,.09);
  z-index:20;
  padding:6px max(8px, env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom));
}
nav#tabbar button{
  flex:1;
  background:none;
  border:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:7px 2px;
  border-radius:var(--radius-s);
  color:var(--ink-soft);
  cursor:pointer;
}
nav#tabbar button .ic{width:20px;height:20px;display:block;}
nav#tabbar button span.lbl{font-size:10.5px;font-weight:600;letter-spacing:.01em;}
nav#tabbar button.active{color:var(--primary-deep);background:var(--primary-soft);}
nav#tabbar button:hover{color:var(--primary-deep);}

@media (min-width:860px){
  #app{
    max-width:1040px;
    flex-direction:row;
    padding-bottom:0;
  }
  nav#tabbar{
    position:sticky;
    top:0;
    left:auto;right:auto;bottom:auto;
    flex-direction:column;
    width:188px;
    height:100vh;
    border-top:none;
    border-right:1px solid var(--line);
    box-shadow:none;
    padding:18px 10px;
    gap:2px;
    align-items:stretch;
  }
  nav#tabbar button{
    flex-direction:row;
    justify-content:flex-start;
    gap:10px;
    padding:10px 12px;
  }
  nav#tabbar button span.lbl{font-size:13.5px;}
  .app-header{padding:26px 28px 6px;}
  main#views{padding:4px 28px 40px;flex:1;min-width:0;}
}

/* ---------- Cards / sections ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-m);
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:16px;
}
.card h2{font-size:13px;margin:0 0 12px;font-weight:700;letter-spacing:.02em;color:var(--primary-deep);text-transform:uppercase;font-family:var(--font-body);}

.section-title{
  font-size:19px;
  font-weight:650;
  margin:18px 0 12px;
  letter-spacing:-.01em;
}
.section-sub{font-size:13px;color:var(--ink-soft);margin:-8px 0 16px;}

/* ---------- Dashboard hero ---------- */
.hero{
  position:relative;
  border-radius:var(--radius-l);
  box-shadow:0 10px 30px rgba(14,80,65,.18);
  padding:24px 22px 22px;
  margin:10px 0 16px;
  overflow:hidden;
  color:#FFFFFF;
  background:linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
}
.hero.negative{
  background:linear-gradient(135deg, var(--negative) 0%, #E8935C 100%);
  box-shadow:0 10px 30px rgba(196,80,60,.22);
}
.hero.warning{
  background:linear-gradient(135deg, var(--warning) 0%, #E8935C 100%);
  box-shadow:0 10px 30px rgba(196,150,40,.22);
}
.hero-progress{
  margin-top:14px;
  height:7px;
  border-radius:5px;
  background:rgba(255,255,255,.28);
  overflow:hidden;
}
.hero-progress-bar{
  height:100%;
  background:#fff;
  border-radius:5px;
  transition:width .3s ease;
}
.hero-progress-label{
  margin-top:5px;
  font-size:11.5px;
  color:rgba(255,255,255,.82);
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.hero-month{font-size:14px;font-weight:600;color:rgba(255,255,255,.86);}
.hero-saldo-label{font-size:12px;color:rgba(255,255,255,.75);margin:10px 0 2px;}
.hero-saldo{font-size:38px;font-weight:650;letter-spacing:-.01em;line-height:1.05;color:#fff;}
.hero-meta{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap;}
.hero-meta div{font-size:12.5px;color:rgba(255,255,255,.78);}
.hero-meta strong{display:block;font-family:var(--font-mono);font-size:14px;color:#fff;font-weight:500;margin-top:2px;}
.hero-stamp-wrap{width:92px;height:92px;flex-shrink:0;}
.hero-stamp-wrap svg{width:100%;height:100%;}

/* trend chart (own card, white surface) */
.trend-card .trend-label{font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
.trend-card svg{width:100%;height:auto;display:block;}

/* ---------- Lists / rows ---------- */
.list{display:flex;flex-direction:column;gap:8px;}

.month-row{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-m);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.month-row-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:14px 16px;
  cursor:pointer;
  background:none;
  border:none;
  width:100%;
  text-align:left;
  color:inherit;
}
.month-row-head:hover{background:var(--surface-soft);}
.mrh-label{font-weight:650;font-size:14.5px;}
.mrh-sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.mrh-right{display:flex;align-items:center;gap:10px;}
.mrh-saldo{font-family:var(--font-mono);font-weight:600;font-size:14.5px;}
.mrh-saldo.pos{color:var(--primary);}
.mrh-saldo.neg{color:var(--negative);}
.chevron{width:16px;height:16px;transition:transform .18s ease;color:var(--ink-soft);flex-shrink:0;}
.month-row.open .chevron{transform:rotate(90deg);}

.month-row-body{
  display:none;
  padding:4px 16px 18px;
  border-top:1px solid var(--line);
}
.month-row.open .month-row-body{display:block;}

/* ---------- Year groups (Meses tab) ---------- */
.year-group{margin-bottom:14px;}
.year-group-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  width:100%;
  text-align:left;
  background:var(--surface-soft);
  border:1px solid var(--line);
  border-radius:var(--radius-m);
  padding:12px 16px;
  cursor:pointer;
  color:inherit;
}
.year-group-head:hover{border-color:var(--primary);}
.ygh-label{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--primary-deep);}
.ygh-sub{font-size:11.5px;color:var(--ink-soft);margin-left:8px;}
.ygh-right{display:flex;align-items:center;gap:10px;}
.ygh-saldo{font-family:var(--font-mono);font-weight:600;font-size:14px;}
.ygh-saldo.pos{color:var(--primary);}
.ygh-saldo.neg{color:var(--negative);}
.year-group-body{display:none;margin-top:10px;}
.year-group.open .year-group-body{display:block;}
.year-group.open .year-group-head{border-color:var(--primary);}
.year-group.open .chevron{transform:rotate(90deg);}

.subgroup{margin-top:14px;}
.subgroup-title{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--primary-deep);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}

.item-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.item-row input[type=text]{flex:1;min-width:0;}
.item-row input[type=number]{width:118px;text-align:right;font-family:var(--font-mono);}

input[type=text],input[type=number],select,textarea{
  background:var(--surface);
  border:1px solid var(--line-strong);
  border-radius:var(--radius-s);
  padding:8px 10px;
  font-size:13.5px;
  color:var(--ink);
}
input[type=text]:focus,input[type=number]:focus,textarea:focus{border-color:var(--primary);}
textarea{font-family:inherit;line-height:1.45;}

.row-total{display:flex;justify-content:space-between;font-size:13.5px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line-strong);}
.row-total strong{font-family:var(--font-mono);}

.totals-block{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
.totals-block .line{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0;}
.totals-block .line strong{font-family:var(--font-mono);font-weight:500;}
.totals-block .line.final{font-size:15.5px;font-weight:650;margin-top:6px;padding-top:8px;border-top:1px solid var(--line);}
.totals-block .line.final strong{font-family:var(--font-mono);}
.note-orig{font-size:11.5px;color:var(--ink-soft);margin-top:8px;font-style:italic;}

/* read-only display rows for centrally-controlled fields */
.readonly-row{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--surface-soft);
  border:1px solid var(--line);
  border-radius:var(--radius-s);
  padding:9px 12px;
  font-size:13.5px;
}
.readonly-row strong{font-family:var(--font-mono);font-weight:600;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--line-strong);
  background:var(--surface);
  color:var(--ink);
  border-radius:var(--radius-s);
  padding:8px 14px;
  font-size:13px;
  font-weight:650;
  cursor:pointer;
}
.btn:hover{background:var(--surface-soft);border-color:var(--primary);}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-deep);}
.btn-ghost{border:none;background:none;color:var(--ink-soft);padding:6px 8px;}
.btn-ghost:hover{color:var(--negative);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border:none;background:none;color:var(--ink-soft);}
.btn-icon:hover{color:var(--negative);background:var(--surface-soft);border-radius:50%;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}

.fab-add{
  width:100%;
  padding:11px;
  border-radius:var(--radius-m);
  border:1.5px dashed var(--line-strong);
  background:none;
  color:var(--primary-deep);
  font-weight:650;
  font-size:13.5px;
  cursor:pointer;
  margin-top:10px;
}
.fab-add:hover{border-color:var(--primary);background:var(--primary-soft);}

/* ---------- Fixed expenses table ---------- */
.fixed-table .item-row{padding:2px 0;}
.fixed-total{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
  font-size:15px;font-weight:650;
}
.fixed-total strong{font-family:var(--font-mono);font-size:18px;color:var(--primary-deep);}

/* ---------- Orçamento settings rows ---------- */
.settings-row{
  display:flex;justify-content:space-between;align-items:center;gap:14px;
  padding:12px 0;
  border-top:1px solid var(--line);
}
.settings-row:first-of-type{border-top:none;padding-top:0;}
.settings-label{font-size:13.5px;font-weight:650;display:block;}
.settings-control{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.settings-control input[type=number]{width:96px;text-align:right;font-family:var(--font-mono);}
#closingDayInput{width:56px !important;text-align:center;}

/* ---------- Terceiros tab ---------- */
.terc-summary-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.terc-summary-line strong{font-family:var(--font-mono);font-size:20px;color:var(--primary-deep);}

.rec-terc-row{
  border:1px solid var(--line);
  border-radius:var(--radius-s);
  padding:10px 12px;
  margin-bottom:10px;
  background:var(--surface-soft);
}
.rec-terc-top{display:flex;align-items:center;gap:8px;}
.rec-terc-top input[type=text]{flex:1;min-width:0;}
.rec-terc-top input[type=number]{width:110px;text-align:right;font-family:var(--font-mono);}
.rec-terc-dates{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--ink-soft);}
.rec-terc-dates select{padding:5px 6px;font-size:12px;}
.rec-terc-dates label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-soft);}

.terc-lookup-result{margin-top:12px;}
.terc-lookup-result .item-row-static{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
.terc-lookup-result .item-row-static strong{font-family:var(--font-mono);}

/* ---------- Trips ---------- */
.trip-card{margin-bottom:14px;}
.trip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.trip-head input[type=text]{font-size:15px;font-weight:650;border:none;background:none;padding:2px 0;}
.trip-total{font-family:var(--font-mono);font-weight:650;color:var(--primary-deep);}

/* ---------- Empty states ---------- */
.empty{
  text-align:center;
  padding:34px 16px;
  color:var(--ink-soft);
  font-size:13.5px;
}
.empty .ic{width:34px;height:34px;margin:0 auto 10px;opacity:.5;color:var(--primary);}

/* ---------- Toast ---------- */
#toast{
  position:fixed;
  left:50%;
  bottom:96px;
  transform:translate(-50%,12px);
  background:var(--toast-bg);
  color:#fff;
  font-size:13px;
  font-weight:500;
  padding:9px 16px;
  border-radius:var(--radius-m);
  box-shadow:var(--shadow);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
  z-index:50;
}
#toast.show{opacity:1;transform:translate(-50%,0);}
@media (min-width:860px){
  #toast{bottom:24px;}
}

/* ---------- Auth gate ---------- */
.auth-gate{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg, var(--primary) 0%, var(--blue) 100%);
  padding:20px;
  z-index:100;
}
.auth-card{
  background:var(--surface);
  border-radius:var(--radius-l);
  box-shadow:0 10px 30px rgba(14,80,65,.22);
  padding:30px 26px;
  width:100%;
  max-width:360px;
}
.auth-card input{width:100%;margin-bottom:10px;box-sizing:border-box;}
.auth-error{color:var(--negative);font-size:12.5px;min-height:16px;margin-top:2px;}

/* ---------- Misc helpers ---------- */
.hint{font-size:12px;color:var(--ink-soft);}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.mt-0{margin-top:0;}

/* ---------- Print-only summary (used for the PDF export) ---------- */
.print-only{display:none;}
@media print{
  body *{visibility:hidden;}
  .print-only, .print-only *{visibility:visible;}
  .print-only{
    display:block;
    position:absolute;
    left:0;
    top:0;
    width:100%;
    padding:24px;
    background:#fff;
    color:#12302B;
  }
}

</style>
</head>
<body>
<div id="authGate" class="auth-gate">
  <div class="auth-card">
    <p class="eyebrow" style="text-align:center;">Orçamento doméstico</p>
    <h1 style="text-align:center;margin:0 0 18px;">Entrar</h1>
    <input type="email" id="authEmail" placeholder="E-mail" autocomplete="username">
    <input type="password" id="authPassword" placeholder="Senha" autocomplete="current-password">
    <div class="auth-error" id="authError"></div>
    <button class="btn btn-primary" id="authLoginBtn" style="width:100%;justify-content:center;margin-top:10px;">Entrar</button>
    <button class="btn" id="authSignupBtn" style="width:100%;justify-content:center;margin-top:8px;">Criar conta</button>
    <p class="hint" id="authStatus" style="text-align:center;margin-top:14px;"></p>
  </div>
</div>

<div id="app" style="display:none;">

  <nav id="tabbar">
    <button data-tab="resumo" class="active">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5c0-.83.67-1.5 1.5-1.5h9.5l5 5v11c0 .83-.67 1.5-1.5 1.5h-13C4.67 21.5 4 20.83 4 20V5.5z"/><path d="M15 4v4.5a.5.5 0 00.5.5H20"/><path d="M8 13h8M8 16.5h5"/></svg>
      <span class="lbl">Orçamento</span>
    </button>
    <button data-tab="meses">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5.5" width="16" height="15" rx="1.6"/><path d="M4 9.5h16M8 3.5v4M16 3.5v4"/><path d="M8 13.2h2M11.5 13.2h2M15 13.2h2M8 16.6h2M11.5 16.6h2"/></svg>
      <span class="lbl">Meses</span>
    </button>
    <button data-tab="fixas">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 3.5l6 6-3.2 3.2c-.3-1-.9-2-1.8-2.9-.9-.9-1.9-1.5-2.9-1.8z"/><path d="M13.3 9.8l-7.6 7.6M4 20l3-1 1-3"/><path d="M11.3 11.8l3-3"/></svg>
      <span class="lbl">Fixas</span>
    </button>

/* ===================== Constants & helpers ===================== */
const STORAGE_KEY = 'orcamento_domestico_v1';
const MONTH_NAMES = ['', 'Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let _uidCounter = 0;
function uid(){
  _uidCounter += 1;
  return 'id' + Date.now().toString(36) + '_' + _uidCounter.toString(36) + '_' + Math.random().toString(36).slice(2,7);
}

const currencyFmt = new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' });
function fmtMoney(v){
  if (v === null || v === undefined || isNaN(v)) v = 0;
  return currencyFmt.format(v);
}
function escapeHtml(s){
  if (s === null || s === undefined) return '';
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}
function sumList(list){
  return (list || []).reduce((acc, it) => acc + (Number(it.value) || 0), 0);
}
function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }

function monthIdParts(id){
  const [y, m] = id.split('-').map(Number);
  return { year: y, month: m };
}
function monthIdToLabel(id){
  const { year, month } = monthIdParts(id);
  return `${MONTH_NAMES[month]}/${year}`;
}
function nextMonthId(id){
  const { year, month } = monthIdParts(id);
  let y = year, m = month + 1;
  if (m > 12){ m = 1; y += 1; }
  return `${y}-${String(m).padStart(2,'0')}`;
}

/* ===================== State ===================== */
let state = null;
let openMonths = new Set();
let openYears = new Set();
let activeTab = 'resumo';
let saveTimer = null;

function ensureIds(s){
  (s.fixedExpenses || []).forEach(it => { if(!it.id) it.id = uid(); });
  (s.months || []).forEach(m => {
    if(!m.id) m.id = uid();
    (m.categories || []).forEach(it => { if(!it.id) it.id = uid(); });
    (m.extras || []).forEach(it => { if(!it.id) it.id = uid(); });
    (m.terceiros || []).forEach(it => { if(!it.id) it.id = uid(); });
  });
  (s.trips || []).forEach(t => {
    if(!t.id) t.id = uid();
    (t.items || []).forEach(it => { if(!it.id) it.id = uid(); });
  });
  if (!Array.isArray(s.terceirosRecurring)) s.terceirosRecurring = [];
  s.terceirosRecurring.forEach(r => { if(!r.id) r.id = uid(); });
  if (typeof s.income !== 'number') s.income = 23500;
  if (typeof s.closingDay !== 'number') s.closingDay = 23;
  if (s.theme !== 'light' && s.theme !== 'dark') s.theme = 'light';
}

}

/* ===================== Computations ===================== */
function fixedExpensesForMonth(monthId){
  return (state.fixedExpenses || []).filter(it =>
    (!it.startMonthId || monthId >= it.startMonthId) && (!it.endMonthId || monthId <= it.endMonthId)
  );
}
function computeFixedTotal(s, monthId){
  if (monthId) return round2(sumList(fixedExpensesForMonth(monthId)));
  return round2(sumList(s.fixedExpenses));
}

/* A month is "open" (current or future) once its id reaches the active invoice
   month. Open months follow the live monthly income / fixed total settings;
   closed (past) months keep their own historical snapshot. */
function isMonthOpen(monthId){
  return monthId >= computeActiveMonthId(state.closingDay);
}

function terceirosForMonth(m){
  const legacy = m.terceiros || [];
  const recurring = (state.terceirosRecurring || []).filter(r =>
    m.id >= r.startMonthId && (!r.endMonthId || m.id <= r.endMonthId)
  );
  return legacy.concat(recurring);
}

function computeMonth(m){
  const catSum = round2(sumList(m.categories));
  const extrasSum = round2(sumList(m.extras));
  const tercList = terceirosForMonth(m);
  const tercSum = round2(sumList(tercList));
  const open = isMonthOpen(m.id);
  const effFixed = open ? computeFixedTotal(state, m.id) : (m.fixedTotal || 0);
  const effIncome = open ? (state.income || 0) : (m.income || 0);
  const totalMes = round2(effFixed + catSum - tercSum + extrasSum);
  const saldo = round2(effIncome - totalMes);
  return { catSum, extrasSum, tercSum, tercList, totalMes, saldo, effFixed, effIncome, isOpen: open };
}
function sortedMonths(){
  return state.months.slice().sort((a,b) => a.id < b.id ? 1 : (a.id > b.id ? -1 : 0));
}

/* Percent of income already consumed this month, and which color tier that
   falls into: 0-60% good (green), 61-99% warning (amber), 100%+ over (red). */
function percentConsumed(c){
  if (!c.effIncome) return 0;
  return Math.max(0, c.totalMes / c.effIncome) * 100;
}
function incomeTier(pct){
  if (pct >= 100) return 'over';
  if (pct >= 61) return 'warning';
  return 'good';
}

/* The "active invoice month": purchases made up to the closing day still belong
   to next month's bill (e.g. closing day 23 -> on June 16 you're still inside the
   cycle that will be billed as July). This is what Resumo should show by default,
   instead of simply the most recent row in the list (which may include months
   the user pre-filled ahead of time as projections). */
function computeActiveMonthId(closingDay){
  const now = new Date();
  const day = now.getDate();
  let month = now.getMonth() + 1;
  let year = now.getFullYear();
  month += (day <= closingDay ? 1 : 2);
  while (month > 12){ month -= 12; year += 1; }
  return `${year}-${String(month).padStart(2,'0')}`;
}

function pickResumoMonth(){
  const months = sortedMonths();
  if (months.length === 0) return null;
  const activeId = computeActiveMonthId(state.closingDay);
  const exact = months.find(m => m.id === activeId);
  if (exact) return { month: exact, activeId, isExact: true };
  const fallback = months.find(m => m.id <= activeId) || months[0];
  return { month: fallback, activeId, isExact: false };
}

/* ===================== Stamp SVG ===================== */
function buildStamp(positive, suffix){
  const color = 'rgba(255,255,255,0.95)';
  const word = positive ? 'EM DIA' : 'ATENÇÃO';
  const angle = positive ? -7 : -10;
  const cx=50, cy=50, baseR=41;
  const N = 26;
  let d = '';
  for(let i=0;i<=N;i++){
    const t = (i/N)*Math.PI*2;
    const wobble = Math.sin(i*2.3 + (positive?1.3:4.1))*1.5 + Math.cos(i*3.1)*1.0;
    const r = baseR + wobble;
    const x = cx + r*Math.cos(t);
    const y = cy + r*Math.sin(t);
    d += (i===0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  }
  d += 'Z';
  const arcTopId = 'stampArcTop_' + suffix;
  const arcBotId = 'stampArcBot_' + suffix;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${word}">
    <g transform="rotate(${angle} 50 50)" style="opacity:.9;">
      <path d="${d}" fill="none" stroke="${color}" stroke-width="2.3"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke="${color}" stroke-width="1"/>
      <path id="${arcTopId}" d="M 16 52 A 34 34 0 0 1 84 52" fill="none"/>
      <text font-family="Inter, sans-serif" font-weight="700" font-size="8.6" letter-spacing="1.4" fill="${color}">
        <textPath href="#${arcTopId}" startOffset="50%" text-anchor="middle">${word}</textPath>
      </text>
      <text x="50" y="55" text-anchor="middle" font-family="Sora, sans-serif" font-weight="650" font-size="13" fill="${color}">SALDO</text>
      <path id="${arcBotId}" d="M 20 58 A 30 30 0 0 0 80 58" fill="none"/>
      <text font-family="Inter, sans-serif" font-weight="600" font-size="9" letter-spacing="3" fill="${color}">
        <textPath href="#${arcBotId}" startOffset="50%" text-anchor="middle">${positive ? '• • •' : '! ! !'}</textPath>
      </text>
    </g>
  </svg>`;
}

/* ===================== Trend chart SVG ===================== */
function buildTrendChart(){
  const all = sortedMonths();
  const recent = all.slice(0, 12).slice().reverse();
  if (recent.length === 0) return '<p class="hint">Sem dados suficientes ainda.</p>';
  const w = 600, h = 140, padX = 4;
  const vals = recent.map(m => computeMonth(m).saldo);
  const maxAbs = Math.max(1, ...vals.map(v => Math.abs(v)));
  const barW = (w - padX*2) / recent.length;
  const midY = h/2;
  const maxBarH = h/2 - 16;
  let bars = '';
  let labels = '';
  recent.forEach((m,i) => {
    const v = vals[i];
    const bh = Math.max(Math.abs(v)/maxAbs * maxBarH, 1.5);
    const x = padX + i*barW + barW*0.2;
    const bw = barW*0.6;
    const y = v >= 0 ? midY - bh : midY;
    const color = v >= 0 ? 'var(--primary)' : 'var(--negative)';
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2.5" fill="${color}" opacity="0.88"></rect>`;
    if (i === 0 || i === recent.length-1 || recent.length <= 6){
      const { month } = monthIdParts(m.id);
      labels += `<text x="${(x+bw/2).toFixed(1)}" y="${h-2}" font-size="8.5" text-anchor="middle" fill="var(--ink-soft)" font-family="Inter, sans-serif">${MONTH_NAMES[month].slice(0,3)}</text>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="${midY}" x2="${w}" y2="${midY}" stroke="var(--line-strong)" stroke-width="1"></line>
    ${bars}
    ${labels}
  </svg>`;
}

/* Distinct category names used across all months, for autocomplete and the
   per-category trend chart. Sorted alphabetically, case preserved as typed. */
function collectCategoryNames(){
  const names = new Set();
  (state.months || []).forEach(m => (m.categories || []).forEach(c => {
    if (c.name && c.name.trim()) names.add(c.name.trim());
  }));
  return Array.from(names).sort((a,b) => a.localeCompare(b, 'pt-BR'));
}

let selectedCategoryForChart = '';

function buildCategoryTrendChart(categoryName){
  const all = sortedMonths();
  const recent = all.slice(0, 12).slice().reverse();
  if (recent.length === 0) return '<p class="hint">Sem dados suficientes ainda.</p>';
  const w = 600, h = 140, padX = 4;
  const vals = recent.map(m => {
    const cat = (m.categories || []).find(c => (c.name || '').trim() === categoryName);
    return cat ? (cat.value || 0) : 0;
  });
  const maxAbs = Math.max(1, ...vals.map(v => Math.abs(v)));
  const barW = (w - padX*2) / recent.length;
  const baseY = h - 18;
  const maxBarH = baseY - 6;
  let bars = '';
  let labels = '';
  recent.forEach((m,i) => {
    const v = vals[i];
    const bh = v > 0 ? Math.max(v/maxAbs * maxBarH, 1.5) : 0;
    const x = padX + i*barW + barW*0.2;
    const bw = barW*0.6;
    const y = baseY - bh;
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2.5" fill="var(--blue)" opacity="0.88"></rect>`;
    if (i === 0 || i === recent.length-1 || recent.length <= 6){
      const { month } = monthIdParts(m.id);
      labels += `<text x="${(x+bw/2).toFixed(1)}" y="${h-4}" font-size="8.5" text-anchor="middle" fill="var(--ink-soft)" font-family="Inter, sans-serif">${MONTH_NAMES[month].slice(0,3)}</text>`;
    }
  });
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="0" y1="${baseY}" x2="${w}" y2="${baseY}" stroke="var(--line-strong)" stroke-width="1"></line>
    ${bars}
    ${labels}
  </svg>`;
}

    return `

        <button class="year-group-head" data-action="toggle-year" data-year="${year}">
          <div>
            <span class="ygh-label">${year}</span>
            <span class="ygh-sub">${yearMonths.length} ${yearMonths.length === 1 ? 'mês' : 'meses'}</span>
          </div>
          <div class="ygh-right">
            <span class="ygh-saldo ${yearSaldo>=0?'pos':'neg'}">${fmtMoney(yearSaldo)}</span>
            ${ICON_CHEVRON}
          </div>
        </button>
        <div class="year-group-body">
          <div class="list">
            ${yearMonths.map(monthRowHtml).join('')}
          </div>
        </div>
      </div>`;
  }).join('');

  view.innerHTML = `
    <button class="btn btn-primary" data-action="new-month" style="width:100%;justify-content:center;margin-bottom:14px;">${ICON_PLUS} Novo mês</button>
    ${datalistHtml}
    ${yearBlocks}
  `;
}

/* ===================== Render: Fixas ===================== */
function monthYearSelectsGeneric(idValue, refId, actionPrefix, dataAttr){
  const parts = idValue ? monthIdParts(idValue) : monthIdParts(computeActiveMonthId(state.closingDay));
  const monthOpts = MONTH_NAMES.slice(1).map((nm,i) => `<option value="${i+1}" ${i+1===parts.month?'selected':''}>${nm.slice(0,3)}</option>`).join('');
  const yearOpts = [];
  for(let y = 2020; y <= 2031; y++) yearOpts.push(`<option value="${y}" ${y===parts.year?'selected':''}>${y}</option>`);
  return `
    <select data-action="${actionPrefix}-month" data-${dataAttr}="${refId}">${monthOpts}</select>
    <select data-action="${actionPrefix}-year" data-${dataAttr}="${refId}">${yearOpts.join('')}</select>`;
}

function fixedDateControlsHtml(item){
  const hasRange = !!(item.startMonthId || item.endMonthId);
  if (!hasRange){
    return `<label class="hint" style="display:flex;align-items:center;gap:4px;margin-top:6px;">
      <input type="checkbox" data-action="toggle-fixed-range" data-fixed="${item.id}"> Definir período de vigência
    </label>`;
  }
  const noEnd = !item.endMonthId;
  return `
    <div class="rec-terc-dates" style="margin-top:8px;">
      <span>Início</span>
      ${monthYearSelectsGeneric(item.startMonthId, item.id, 'set-fixed-start', 'fixed')}
      <span>Fim</span>
      ${monthYearSelectsGeneric(item.endMonthId, item.id, 'set-fixed-end', 'fixed').replace(/<select/g, noEnd ? '<select disabled' : '<select')}
      <label><input type="checkbox" data-action="set-fixed-no-end" data-fixed="${item.id}" ${noEnd?'checked':''}> Sem fim</label>
      <button class="btn-ghost btn-sm" data-action="clear-fixed-range" data-fixed="${item.id}">Remover período</button>
    </div>`;
}

function fixedRowHtml(item){
  return `
  <div class="rec-terc-row fixed-exp-row" data-fixed-id="${item.id}">
    <div class="item-row" style="margin-bottom:0;">
      <input type="text" data-field="name" value="${escapeHtml(item.name)}" placeholder="Despesa">
      <input type="number" step="0.01" data-field="value" value="${item.value}">
      <button class="btn-icon" data-action="remove-fixed" title="Remover">${ICON_TRASH}</button>
    </div>
    ${fixedDateControlsHtml(item)}
  </div>`;
}

function renderFixas(){
  const view = document.getElementById('view-fixas');
  const activeId = computeActiveMonthId(state.closingDay);
  const total = computeFixedTotal(state, activeId);
  view.innerHTML = `
    <div class="card">
      <h2>Despesas fixas mensais</h2>
      <p class="section-sub" style="margin-top:-4px;">Esse total é aplicado automaticamente a todos os meses em aberto (a partir do mês atual da fatura) — não é mais necessário atualizar campo por campo. Por padrão, cada despesa vale para sempre; defina um período só se ela tiver início ou fim específicos (ex: uma assinatura nova ou um contrato que vai terminar).</p>
      <div class="list fixed-table" id="fixed-list">
        ${(state.fixedExpenses||[]).map(fixedRowHtml).join('')}
      </div>
      <button class="fab-add" data-action="add-fixed">${ICON_PLUS} Adicionar despesa fixa</button>
      <div class="fixed-total" id="fixed-total-line">
        <span>Total fixo em ${escapeHtml(monthIdToLabel(activeId))}</span>
        <strong>${fmtMoney(total)}</strong>
      </div>
    </div>
  `;
}

/* ===================== Render: Terceiros ===================== */
function monthYearSelects(idValue, recId, which){
  return monthYearSelectsGeneric(idValue, recId, `set-rec-${which}`, 'rec');
}

function recurringTerceiroRowHtml(item){
  const noEnd = !item.endMonthId;
  return `
  <div class="rec-terc-row" data-rec-id="${item.id}">
    <div class="rec-terc-top">
      <input type="text" data-field="name" value="${escapeHtml(item.name)}" placeholder="Pessoa / item">
      <input type="number" step="0.01" data-field="value" value="${item.value}">
      <button class="btn-icon" data-action="remove-recurring-terceiro" title="Remover">${ICON_TRASH}</button>
    </div>
    <div class="rec-terc-dates">
      <span>Início</span>
      ${monthYearSelects(item.startMonthId, item.id, 'start')}
      <span>Fim</span>
      ${monthYearSelects(item.endMonthId, item.id, 'end').replace(/<select/g, noEnd ? '<select disabled' : '<select')}

    </div>

function renderTerceiros(){
  const view = document.getElementById('view-terceiros');
  const months = sortedMonths();
  const activeId = computeActiveMonthId(state.closingDay);
  const activeMonth = findMonth(activeId);
  const recurring = state.terceirosRecurring || [];
  const current = recurring.filter(r => !r.endMonthId || r.endMonthId >= activeId);
  const legacyItems = activeMonth ? (activeMonth.terceiros || []) : [];
  const currentTotal = activeMonth
    ? round2(sumList(terceirosForMonth(activeMonth)))
    : round2(sumList(current.filter(r => r.startMonthId <= activeId)));

  const legacyBlock = legacyItems.length ? `
    <p class="hint" style="margin:14px 0 8px;">Itens já existentes em ${escapeHtml(monthIdToLabel(activeId))} (lançados individualmente, sem período de vigência):</p>
    <div class="list" id="terc-legacy-${activeId}">
      ${legacyItems.map(it => categoryRowHtml(activeId, 'terceiros', it, 'Pessoa / item')).join('')}
    </div>
  ` : '';

  view.innerHTML = `
    <p class="section-sub">Custos compartilhados com a família ou que serão reembolsados. Cada um existe entre um mês de início e (opcionalmente) um mês de fim; o valor é descontado do total nesse período.</p>

    <div class="card">
      <h2 class="mt-0">Atuais e futuros</h2>
      <div class="terc-summary-line">
        <span class="hint">Total descontado em ${escapeHtml(monthIdToLabel(activeId))}</span>
        <strong>${fmtMoney(currentTotal)}</strong>
      </div>
      <div id="rec-terc-list">
        ${current.length ? current.map(recurringTerceiroRowHtml).join('') : '<p class="hint">Nenhum custo recorrente cadastrado ainda.</p>'}
      </div>
      ${legacyBlock}
      <button class="fab-add" data-action="add-recurring-terceiro">${ICON_PLUS} Adicionar custo</button>
    </div>

    <div class="card">
      <h2 class="mt-0">Consultar meses anteriores</h2>
      <p class="hint" style="margin:-4px 0 10px;">Veja os valores de terceiros que já existiam em um mês já encerrado.</p>
      <select id="tercLookupSelect">
        <option value="">Selecione um mês…</option>
        ${months.map(m => `<option value="${m.id}">${escapeHtml(m.label)}</option>`).join('')}
      </select>
      <div class="terc-lookup-result" id="tercLookupResult"></div>
    </div>
  `;
}

function refreshTerceirosSummary(){
  const el = document.querySelector('.terc-summary-line strong');
  if (!el) return;
  const activeId = computeActiveMonthId(state.closingDay);
  const activeMonth = findMonth(activeId);
  const total = activeMonth
    ? round2(sumList(terceirosForMonth(activeMonth)))
    : round2(sumList((state.terceirosRecurring||[]).filter(r => r.startMonthId <= activeId && (!r.endMonthId || r.endMonthId >= activeId))));
  el.textContent = fmtMoney(total);
}

function renderTercLookupResult(monthId){

  const month = findMonth(monthId);

  const total = round2(sumList(list));
  resultEl.innerHTML = `
    ${list.length ? list.map(it => `<div class="item-row-static"><span>${escapeHtml(it.name || '—')}</span><strong>${fmtMoney(it.value)}</strong></div>`).join('') : '<p class="hint">Nenhum item de terceiros nesse mês.</p>'}
    <div class="row-total"><span>Total em ${escapeHtml(month.label)}</span><strong>${fmtMoney(total)}</strong></div>

}

/* ===================== Export: CSV summary ===================== */
function csvEscape(v){
  if (typeof v === 'number') return String(round2(v)).replace('.', ',');
  const s = String(v == null ? '' : v);
  if (s.includes(';') || s.includes('"') || s.includes('\n')){
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}
function buildSummaryCSV(){
  const months = sortedMonths();
  const header = ['Mês','Renda','Despesas fixas','Categorias variáveis','Terceiros (desconto)','Extras','Total do mês','Saldo'];
  const rows = months.map(m => {
    const c = computeMonth(m);
    return [m.label, c.effIncome, c.effFixed, c.catSum, c.tercSum, c.extrasSum, c.totalMes, c.saldo];
  });
  const lines = [header.join(';')].concat(rows.map(r => r.map(csvEscape).join(';')));
  return lines.join('\r\n');
}

/* ===================== Empty state helper ===================== */
function emptyState(title, sub){
  return `<div class="empty"><div class="ic">${ICON_PLUS}</div><div><strong>${escapeHtml(title)}</strong></div>${sub ? `<div style="margin-top:4px;">${escapeHtml(sub)}</div>` : ''}</div>`;
}

/* ===================== Tab switching ===================== */
const RENDERERS = { resumo: renderResumo, meses: renderMeses, fixas: renderFixas, terceiros: renderTerceiros, viagens: renderViagens };
const TAB_TITLES = { resumo: 'Orçamento', meses: 'Meses', fixas: 'Despesas fixas', terceiros: 'Terceiros', viagens: 'Viagens' };

function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('#tabbar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + tab));
  document.getElementById('headerTitle').textContent = TAB_TITLES[tab] || '';
  RENDERERS[tab]();
}

/* ===================== Mutation helpers ===================== */
function findMonth(id){ return state.months.find(m => m.id === id); }
function findList(month, listKey){ return month[listKey]; }

function rebuildMonthAuxiliary(monthId){
  const month = findMonth(monthId);
  if (!month) return;
  const totalsEl = document.getElementById('totals-' + monthId);
  if (totalsEl) totalsEl.innerHTML = monthTotalsHtml(month);
  const mrh = document.querySelector(`.month-row[data-month-id="${monthId}"] .mrh-sub`);
  const c = computeMonth(month);
  if (mrh) mrh.textContent = 'Total ' + fmtMoney(c.totalMes);
  const saldoEl = document.querySelector(`.month-row[data-month-id="${monthId}"] .mrh-saldo`);
  if (saldoEl){
    saldoEl.textContent = fmtMoney(c.saldo);
    saldoEl.classList.toggle('pos', c.saldo >= 0);
    saldoEl.classList.toggle('neg', c.saldo < 0);
  }
}

function rebuildList(monthId, listKey){
  const month = findMonth(monthId);
  if (!month) return;
  const placeholderMap = { categories:'Categoria', extras:'Descrição', terceiros:'Pessoa / item' };
  const idPrefixMap = { categories:'cats', extras:'extras', terceiros:'terc-legacy' };
  const html = (month[listKey]||[]).map(it => categoryRowHtml(monthId, listKey, it, placeholderMap[listKey])).join('');
  const primary = document.getElementById(`${idPrefixMap[listKey]}-${monthId}`);
  if (primary) primary.innerHTML = html;
  rebuildMonthAuxiliary(monthId);
  if (listKey === 'terceiros') refreshTerceirosSummary();
}

/* ===================== Event delegation ===================== */
function setupEvents(){
  document.getElementById('tabbar').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-tab]');
    if (!btn) return;
    switchTab(btn.dataset.tab);
  });

  document.getElementById('views').addEventListener('click', (e) => {
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const action = actionEl.dataset.action;

    if (action === 'toggle-month'){
      const id = actionEl.dataset.month;
      const row = document.querySelector(`.month-row[data-month-id="${id}"]`);
      if (openMonths.has(id)){ openMonths.delete(id); row.classList.remove('open'); }
      else { openMonths.add(id); row.classList.add('open'); }
      return;
    }

    if (action === 'toggle-year'){
      const year = actionEl.dataset.year;
      const grp = document.querySelector(`.year-group[data-year="${year}"]`);
      if (openYears.has(year)){ openYears.delete(year); grp.classList.remove('open'); }
      else { openYears.add(year); grp.classList.add('open'); }
      return;
    }

    if (action === 'goto-tab'){
      switchTab(actionEl.dataset.tab);
      return;
    }

    if (action === 'logout'){
      fbAuth.signOut();
      return;
    }

    if (action === 'export-data'){
      try{
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date().toISOString().slice(0,10);
        a.href = url;
        a.download = `orcamento-backup-${today}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setSaveStatus('Backup exportado');
      }catch(e){
        if (window.alert) window.alert('Não foi possível exportar o backup.');
      }
      return;
    }

    if (action === 'import-data'){
      const fileInput = document.getElementById('importFileInput');
      if (fileInput) fileInput.click();
      return;
    }

    if (action === 'export-csv'){
      try{
        const csv = buildSummaryCSV();
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date().toISOString().slice(0,10);
        a.href = url;
        a.download = `orcamento-resumo-${today}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setSaveStatus('CSV exportado');
      }catch(e){
        if (window.alert) window.alert('Não foi possível exportar o CSV.');
      }
      return;
    }

    if (action === 'export-pdf'){
      try{
        const printEl = document.getElementById('printSummary');
        if (printEl) printEl.innerHTML = buildPrintSummaryHtml();
        if (window.print) window.print();
      }catch(e){
        if (window.alert) window.alert('Não foi possível gerar o PDF.');
      }
      return;
    }

    if (action === 'add-recurring-terceiro'){
      const activeId = computeActiveMonthId(state.closingDay);
      state.terceirosRecurring.push({ id: uid(), name: '', value: 0, startMonthId: activeId, endMonthId: null });
      renderTerceiros();
      scheduleSave();
      return;
    }

    if (action === 'remove-recurring-terceiro'){
      const row = actionEl.closest('.rec-terc-row');
      const recId = row.dataset.recId;
      state.terceirosRecurring = state.terceirosRecurring.filter(r => r.id !== recId);
      renderTerceiros();
      scheduleSave();
      return;
    }

    if (action === 'create-active-month'){
      const targetId = actionEl.dataset.targetId;
      if (state.months.some(m => m.id === targetId)) return;
      const months = sortedMonths();
      const template = months[0];
      const newMonth = {
        id: targetId,
        label: monthIdToLabel(targetId),
        income: state.income,
        fixedTotal: computeFixedTotal(state, targetId),
        categories: template ? template.categories.map(c => ({ id: uid(), name: c.name, value: c.value })) : [],
        extras: template ? template.extras.map(c => ({ id: uid(), name: c.name, value: c.value })) : [],
        terceiros: template ? template.terceiros.map(c => ({ id: uid(), name: c.name, value: c.value })) : [],
      };
      state.months.push(newMonth);
      openMonths.add(targetId);
      renderResumo();
      scheduleSave();
      showToast(`${newMonth.label} criado`);
      return;
    }

    if (action === 'new-month'){
      const months = sortedMonths();
      const template = months[0];
      const newId = template ? nextMonthId(template.id) : `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
      if (state.months.some(m => m.id === newId)){
        showToast('Já existe um mês com essa data — abra-o para editar.');
        return;
      }
      const newMonth = {
        id: newId,
        label: monthIdToLabel(newId),
        income: state.income,
        fixedTotal: computeFixedTotal(state, newId),
        categories: template ? template.categories.map(c => ({ id: uid(), name: c.name, value: c.value })) : [],
        extras: template ? template.extras.map(c => ({ id: uid(), name: c.name, value: c.value })) : [],
        terceiros: template ? template.terceiros.map(c => ({ id: uid(), name: c.name, value: c.value })) : [],
      };
      state.months.push(newMonth);
      openMonths.add(newId);
      renderMeses();
      scheduleSave();
      showToast('Novo mês criado a partir do anterior');
      return;
    }

    if (action === 'duplicate-month'){
      const id = actionEl.dataset.month;
      const src = findMonth(id);
      if (!src) return;
      let newId = nextMonthId(src.id);
      while (state.months.some(m => m.id === newId)) newId = nextMonthId(newId);
      const dup = {
        id: newId,
        label: monthIdToLabel(newId),
        income: src.income,
        fixedTotal: src.fixedTotal,
        categories: src.categories.map(c => ({ id: uid(), name: c.name, value: c.value })),
        extras: src.extras.map(c => ({ id: uid(), name: c.name, value: c.value })),
        terceiros: src.terceiros.map(c => ({ id: uid(), name: c.name, value: c.value })),
      };
      state.months.push(dup);
      openMonths.add(newId);
      renderMeses();
      scheduleSave();
      showToast('Mês duplicado');
      return;
    }

    if (action === 'remove-month'){
      const id = actionEl.dataset.month;
      const m = findMonth(id);
      if (!m) return;
      if (!confirm(`Excluir o lançamento de ${m.label}? Essa ação não pode ser desfeita.`)) return;
      state.months = state.months.filter(mm => mm.id !== id);
      openMonths.delete(id);
      renderMeses();
      scheduleSave();
      showToast('Mês excluído');
      return;
    }

    if (action === 'add-item'){
      const monthId = actionEl.dataset.month;
      const listKey = actionEl.dataset.list;
      const month = findMonth(monthId);
      if (!month) return;
      month[listKey].push({ id: uid(), name: '', value: 0 });
      if (listKey === 'terceiros') renderTerceiros(); else rebuildList(monthId, listKey);
      scheduleSave();
      return;
    }

    if (action === 'remove-item'){
      const row = actionEl.closest('.item-row');
      const monthId = row.dataset.month;
      const listKey = row.dataset.list;
      const itemId = row.dataset.id;
      const month = findMonth(monthId);
      if (!month) return;
      month[listKey] = month[listKey].filter(it => it.id !== itemId);
      if (listKey === 'terceiros') renderTerceiros(); else rebuildList(monthId, listKey);
      scheduleSave();
      return;
    }

    if (action === 'add-fixed'){
      state.fixedExpenses.push({ id: uid(), name: '', value: 0 });
      renderFixas();
      scheduleSave();
      return;
    }

    if (action === 'remove-fixed'){
      const row = actionEl.closest('[data-fixed-id]');
      const fid = row.dataset.fixedId;
      state.fixedExpenses = state.fixedExpenses.filter(it => it.id !== fid);
      renderFixas();
      scheduleSave();
      return;
    }

    if (action === 'toggle-fixed-range'){
      const row = actionEl.closest('[data-fixed-id]');
      const fid = row.dataset.fixedId;
      const item = state.fixedExpenses.find(it => it.id === fid);
      if (!item) return;
      if (actionEl.checked){
        const activeId = computeActiveMonthId(state.closingDay);
        item.startMonthId = activeId;
        item.endMonthId = null;
      }
      renderFixas();
      scheduleSave();
      return;
    }

    if (action === 'clear-fixed-range'){
      const row = actionEl.closest('[data-fixed-id]');
      const fid = row.dataset.fixedId;
      const item = state.fixedExpenses.find(it => it.id === fid);
      if (!item) return;
      item.startMonthId = null;
      item.endMonthId = null;
      renderFixas();
      scheduleSave();
      return;
    }

    if (action === 'add-trip'){
      const trip = { id: uid(), name: 'Nova viagem', items: [] };
      state.trips.push(trip);
      renderViagens();
      scheduleSave();
      return;
    }

    if (action === 'remove-trip'){
      const tid = actionEl.dataset.trip;
      if (!confirm('Excluir esta viagem?')) return;
      state.trips = state.trips.filter(t => t.id !== tid);
      renderViagens();
      scheduleSave();
      return;
    }

    if (action === 'add-trip-item'){
      const tid = actionEl.dataset.trip;
      const trip = state.trips.find(t => t.id === tid);
      if (!trip) return;
      trip.items.push({ id: uid(), name: '', value: 0 });
      renderViagens();
      scheduleSave();
      return;
    }

    if (action === 'remove-trip-item'){
      const row = actionEl.closest('.item-row');
      const tid = row.dataset.trip;
      const iid = row.dataset.id;
      const trip = state.trips.find(t => t.id === tid);
      if (!trip) return;
      trip.items = trip.items.filter(it => it.id !== iid);
      renderViagens();
      scheduleSave();
      return;
    }
  });

  document.getElementById('views').addEventListener('input', (e) => {
    const t = e.target;

    if (t.matches('input[data-field]') && t.closest('.rec-terc-row') && !t.closest('.fixed-exp-row')){
      const row = t.closest('.rec-terc-row');
      const recId = row.dataset.recId;
      const rec = (state.terceirosRecurring || []).find(r => r.id === recId);
      if (!rec) return;
      if (t.dataset.field === 'name') rec.name = t.value;
      else {
        rec.value = parseFloat(t.value) || 0;
        refreshTerceirosSummary();
      }
      scheduleSave();
      return;
    }

    if (t.matches('input[data-field]') && t.closest('.item-row[data-month]')){
      const row = t.closest('.item-row');
      const monthId = row.dataset.month;
      const listKey = row.dataset.list;
      const itemId = row.dataset.id;
      const month = findMonth(monthId);
      if (!month) return;
      const item = month[listKey].find(it => it.id === itemId);
      if (!item) return;
      if (t.dataset.field === 'name'){
        item.name = t.value;
      } else {
        item.value = parseFloat(t.value) || 0;
        rebuildMonthAuxiliary(monthId);
        if (listKey === 'terceiros') refreshTerceirosSummary();
      }
      scheduleSave();
      return;
    }

    if (t.matches('input[data-field]') && t.closest('.item-row[data-trip]')){
      const row = t.closest('.item-row');
      const tid = row.dataset.trip;
      const iid = row.dataset.id;
      const trip = state.trips.find(tr => tr.id === tid);
      if (!trip) return;
      const item = trip.items.find(it => it.id === iid);
      if (!item) return;
      if (t.dataset.field === 'name') item.name = t.value;
      else {
        item.value = parseFloat(t.value) || 0;
        const totalEl = row.closest('.trip-card').querySelector('.trip-total');
        if (totalEl) totalEl.textContent = fmtMoney(round2(sumList(trip.items)));
      }
      scheduleSave();
      return;
    }

    if (t.matches('input[data-field]') && t.closest('[data-fixed-id]')){
      const row = t.closest('[data-fixed-id]');
      const fid = row.dataset.fixedId;
      const item = state.fixedExpenses.find(it => it.id === fid);
      if (!item) return;
      if (t.dataset.field === 'name') item.name = t.value;
      else {
        item.value = parseFloat(t.value) || 0;
        const totalEl = document.getElementById('fixed-total-line');
        if (totalEl) totalEl.querySelector('strong').textContent = fmtMoney(computeFixedTotal(state, computeActiveMonthId(state.closingDay)));
      }
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-month-notes'){
      const monthId = t.dataset.month;
      const month = findMonth(monthId);
      if (!month) return;
      month.notes = t.value;
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-month-income'){
      const monthId = t.dataset.month;
      const month = findMonth(monthId);
      if (!month) return;
      month.income = parseFloat(t.value) || 0;
      rebuildMonthAuxiliary(monthId);
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-month-fixed'){
      const monthId = t.dataset.month;
      const month = findMonth(monthId);
      if (!month) return;
      month.fixedTotal = parseFloat(t.value) || 0;
      rebuildMonthAuxiliary(monthId);
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-trip-name'){
      const trip = state.trips.find(tr => tr.id === t.dataset.trip);
      if (!trip) return;
      trip.name = t.value;
      scheduleSave();
      return;
    }
  });

  document.getElementById('views').addEventListener('change', (e) => {
    const t = e.target;

    if (t.id === 'importFileInput'){
      const file = t.files && t.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        let parsed;
        try{
          parsed = JSON.parse(reader.result);
        }catch(err){
          window.alert('Esse arquivo não parece ser um backup válido (JSON inválido).');
          return;
        }
        if (!parsed || !Array.isArray(parsed.months)){
          window.alert('Esse arquivo não parece ser um backup válido deste app.');
          return;
        }
        const ok = window.confirm(`Importar este arquivo vai substituir TODOS os dados atuais (${state.months.length} meses) por ${parsed.months.length} meses do backup. Essa ação não pode ser desfeita. Continuar?`);
        if (!ok) return;
        ensureIds(parsed);
        state = parsed;
        RENDERERS[activeTab]();
        scheduleSave();
        setSaveStatus('Backup importado');
      };
      reader.readAsText(file);
      t.value = '';
      return;
    }

    if (t.id === 'incomeInput'){
      let v = parseFloat(t.value);
      if (isNaN(v)) v = 0;
      state.income = v;
      scheduleSave();
      renderResumo();
      return;
    }

    if (t.id === 'categoryTrendSelect'){
      selectedCategoryForChart = t.value;
      const wrap = document.getElementById('categoryTrendChartWrap');
      if (wrap) wrap.innerHTML = selectedCategoryForChart ? buildCategoryTrendChart(selectedCategoryForChart) : '<p class="hint">Escolha uma categoria para ver a evolução dela nos últimos meses.</p>';
      return;
    }

    if (t.id === 'tercLookupSelect'){
      renderTercLookupResult(t.value);
      return;
    }

    if (t.dataset.action === 'set-rec-no-end'){
      const recId = t.dataset.rec;
      const rec = (state.terceirosRecurring || []).find(r => r.id === recId);
      if (!rec) return;
      rec.endMonthId = t.checked ? null : (rec.startMonthId || computeActiveMonthId(state.closingDay));
      renderTerceiros();
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-rec-start-month' || t.dataset.action === 'set-rec-start-year' ||
        t.dataset.action === 'set-rec-end-month' || t.dataset.action === 'set-rec-end-year'){
      const recId = t.dataset.rec;
      const rec = (state.terceirosRecurring || []).find(r => r.id === recId);
      if (!rec) return;
      const which = t.dataset.action.includes('start') ? 'start' : 'end';
      const field = which === 'start' ? 'startMonthId' : 'endMonthId';
      const current = rec[field] || computeActiveMonthId(state.closingDay);
      const parts = monthIdParts(current);
      if (t.dataset.action.endsWith('month')) parts.month = parseInt(t.value, 10);
      else parts.year = parseInt(t.value, 10);
      rec[field] = `${parts.year}-${String(parts.month).padStart(2,'0')}`;
      if (rec.endMonthId && rec.startMonthId && rec.endMonthId < rec.startMonthId){
        if (which === 'start') rec.endMonthId = rec.startMonthId; else rec.startMonthId = rec.endMonthId;
      }
      renderTerceiros();
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-fixed-no-end'){
      const fid = t.dataset.fixed;
      const item = (state.fixedExpenses || []).find(it => it.id === fid);
      if (!item) return;
      item.endMonthId = t.checked ? null : (item.startMonthId || computeActiveMonthId(state.closingDay));
      renderFixas();
      scheduleSave();
      return;
    }

    if (t.dataset.action === 'set-fixed-start-month' || t.dataset.action === 'set-fixed-start-year' ||
        t.dataset.action === 'set-fixed-end-month' || t.dataset.action === 'set-fixed-end-year'){
      const fid = t.dataset.fixed;
      const item = (state.fixedExpenses || []).find(it => it.id === fid);
      if (!item) return;
      const which = t.dataset.action.includes('start') ? 'start' : 'end';
      const field = which === 'start' ? 'startMonthId' : 'endMonthId';
      const current = item[field] || computeActiveMonthId(state.closingDay);
      const parts = monthIdParts(current);
      if (t.dataset.action.endsWith('month')) parts.month = parseInt(t.value, 10);
      else parts.year = parseInt(t.value, 10);
      item[field] = `${parts.year}-${String(parts.month).padStart(2,'0')}`;
      if (item.endMonthId && item.startMonthId && item.endMonthId < item.startMonthId){
        if (which === 'start') item.endMonthId = item.startMonthId; else item.startMonthId = item.endMonthId;
      }
      renderFixas();
      scheduleSave();
      return;
    }

    if (t.id === 'closingDayInput'){
      let v = parseInt(t.value, 10);
      if (isNaN(v)) v = 23;
      v = Math.min(31, Math.max(1, v));
      state.closingDay = v;
      scheduleSave();
      renderResumo();
      return;
    }

    if (t.dataset.action === 'set-month-date-month' || t.dataset.action === 'set-month-date-year'){
      const monthId = t.dataset.month;
      const month = findMonth(monthId);
      if (!month) return;
      const parts = monthIdParts(month.id);
      let { year, month: mNum } = parts;
      if (t.dataset.action === 'set-month-date-month') mNum = parseInt(t.value, 10);
      else year = parseInt(t.value, 10);
      const newId = `${year}-${String(mNum).padStart(2,'0')}`;
      if (newId !== month.id){
        if (state.months.some(m => m.id === newId)){
          showToast('Já existe um mês com essa data.');
          // revert selects by re-render
          renderMeses();
          return;
        }
        month.id = newId;
        month.label = monthIdToLabel(newId);
        if (openMonths.has(parts.year + '-' + String(parts.month).padStart(2,'0'))){
          openMonths.delete(parts.year + '-' + String(parts.month).padStart(2,'0'));
        }
        openMonths.add(newId);
        renderMeses();
        scheduleSave();
        showToast('Data do mês atualizada');
      }
    }
  });
}

/* ===================== Init ===================== */
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme === 'dark' ? 'dark' : 'light');
  const sun = document.getElementById('themeIconSun');
  const moon = document.getElementById('themeIconMoon');
  if (sun && moon){
    sun.style.display = state.theme === 'dark' ? 'none' : '';
    moon.style.display = state.theme === 'dark' ? '' : 'none';
  }
}

function setupThemeToggle(){
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  btn.addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    scheduleSave();
  });
}

function showAuthGate(){
  document.getElementById('app').style.display = 'none';
  document.getElementById('authGate').style.display = 'flex';
}
function showApp(){
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app').style.display = '';
}

function authErrorMessage(err){
  const map = {
    'auth/invalid-email': 'E-mail inválido.',
    'auth/missing-password': 'Digite uma senha.',
    'auth/weak-password': 'A senha precisa ter pelo menos 6 caracteres.',
    'auth/email-already-in-use': 'Já existe uma conta com esse e-mail. Tente entrar em vez de criar.',
    'auth/user-not-found': 'Não encontramos uma conta com esse e-mail.',
    'auth/wrong-password': 'Senha incorreta.',
    'auth/invalid-credential': 'E-mail ou senha incorretos.',
    'auth/too-many-requests': 'Muitas tentativas. Aguarde um pouco e tente de novo.',
    'auth/network-request-failed': 'Falha de conexão. Verifique sua internet.'
  };
  return (err && map[err.code]) || 'Não foi possível concluir. Tente novamente.';
}

function setupAuthGate(){
  const emailInput = document.getElementById('authEmail');
  const passInput = document.getElementById('authPassword');
  const errorEl = document.getElementById('authError');
  const statusEl = document.getElementById('authStatus');

  document.getElementById('authLoginBtn').addEventListener('click', async () => {
    errorEl.textContent = '';
    statusEl.textContent = 'Entrando…';
    try{
      await fbAuth.signInWithEmailAndPassword(emailInput.value.trim(), passInput.value);
    }catch(err){
      statusEl.textContent = '';
      errorEl.textContent = authErrorMessage(err);
    }
  });

  document.getElementById('authSignupBtn').addEventListener('click', async () => {
    errorEl.textContent = '';
    statusEl.textContent = 'Criando conta…';
    try{
      await fbAuth.createUserWithEmailAndPassword(emailInput.value.trim(), passInput.value);
    }catch(err){
      statusEl.textContent = '';
      errorEl.textContent = authErrorMessage(err);
    }
  });
}

let appBooted = false;

async function bootApp(){
  state = await loadState();
  if (!appBooted){
    setupEvents();
    setupThemeToggle();
    appBooted = true;
  }
  applyTheme();
  const todayEl = document.getElementById('todayLabel');
  if (todayEl){
    const now = new Date();
    todayEl.textContent = now.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
  }
  switchTab('resumo');
  window.__appReady = true;
}

if (typeof document !== 'undefined'){
  document.addEventListener('DOMContentLoaded', () => {
    setupAuthGate();
    fbAuth.onAuthStateChanged((user) => {
      if (user){
        showApp();
        bootApp();
      } else {
        window.__appReady = false;
        showAuthGate();
      }
    });
  });
}

</script>
